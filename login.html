<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Anti Boncos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
color:white;
}
.box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Masukkan email">
<button onclick="login()">Masuk</button>
<p id="status"></p>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzkyX1XZs9y6s7FD5dGr30xB4plAmZFMIBT8z7z-5iWJg_Im-IptopF2B0psqfmPHWgbw/exec";

function getDeviceId(){
let id = localStorage.getItem("deviceId");
if(!id){
id = "dev-" + Math.random().toString(36).substring(2,10);
localStorage.setItem("deviceId", id);
}
return id;
}

function login(){

const email = document.getElementById("email").value;
const device = getDeviceId();

const callback = "loginCallback";

window[callback] = function(res){

if(res.status === "success"){

localStorage.setItem("email", email);
localStorage.setItem("deviceId", device);
localStorage.setItem("lastCheck", Date.now());

window.location.href = "/";

}
else if(res.status === "limit"){
document.getElementById("status").innerText = "Device sudah penuh (max 2)";
}
else{
document.getElementById("status").innerText = "Email tidak terdaftar";
}

};

const script = document.createElement("script");
script.src = scriptURL + "?mode=login"
+ "&email=" + encodeURIComponent(email)
+ "&device=" + device
+ "&callback=" + callback;

document.body.appendChild(script);

}

</script>
</body>
</html>
